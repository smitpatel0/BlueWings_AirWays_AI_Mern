    <script>
        const BASE_API_URL = 'http://localhost:5000/api';
        let savedActivePnr = '';
        let failedLoginAttempts = 0; // State machine variable tracker

        function switchTab(target) {
            const tabBook = document.getElementById('tabBook');
            const tabManage = document.getElementById('tabManage');
            const viewBook = document.getElementById('viewBookPanel');
            const viewManage = document.getElementById('viewManageLoginPanel');
            const viewDash = document.getElementById('viewDashboardPanel');
            
            showErrorBanner('');

            if (target === 'book') {
                tabBook.className = "w-1/2 py-3 text-center border-b-2 border-blue-600 text-blue-600 bg-white font-bold";
                tabManage.className = "w-1/2 py-3 text-center border-b-2 border-transparent hover:bg-slate-100";
                viewBook.classList.remove('hidden');
                viewManage.classList.add('hidden');
                viewDash.classList.add('hidden');
            } else {
                tabManage.className = "w-1/2 py-3 text-center border-b-2 border-blue-600 text-blue-600 bg-white font-bold";
                tabBook.className = "w-1/2 py-3 text-center border-b-2 border-transparent hover:bg-slate-100";
                viewBook.classList.add('hidden');
                
                if (savedActivePnr !== '') {
                    viewDash.classList.remove('hidden');
                } else {
                    viewManage.classList.remove('hidden');
                }
            }
        }

        async function executeNewBooking() {
            const first = document.getElementById('bookFirst').value.trim();
            const last = document.getElementById('bookLast').value.trim();
            const selectData = document.getElementById('bookFlightSelect').value.split('|');
            
            showErrorBanner('');
            document.getElementById('bookingSuccessCard').classList.add('hidden');

            try {
                const response = await fetch(`${BASE_API_URL}/bookings/new`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        passengerName: `${first} ${last}`,
                        lastName: last,
                        flightNumber: selectData[0],
                        departure: selectData[1],
                        arrival: selectData[2]
                    })
                });
                const payload = await response.json();

                if (response.status === 201) {
                    document.getElementById('successGeneratedPnr').innerText = payload.booking.pnr;
                    document.getElementById('bookingSuccessCard').classList.remove('hidden');
                    document.getElementById('bookFirst').value = '';
                    document.getElementById('bookLast').value = '';
                } else {
                    showErrorBanner(payload.message);
                }
            } catch (err) {
                showErrorBanner("Networking Error: Cannot communicate with the API server cluster.");
            }
        }

        async function verifyExistingBooking() {
            const pnrInput = document.getElementById('inputPnr').value.trim();
            const lastNameInput = document.getElementById('inputLastName').value.trim();
            showErrorBanner('');

            try {
                const response = await fetch(`${BASE_API_URL}/bookings/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pnr: pnrInput, lastName: lastNameInput })
                });
                const payload = await response.json();

                if (response.ok) {
                    failedLoginAttempts = 0; // Clear failure count tracker
                    savedActivePnr = payload.booking.pnr;
                    renderPassengerDashboardView(payload.booking);
                } else {
                    failedLoginAttempts++;
                    showErrorBanner(`${payload.message} (${failedLoginAttempts}/3 attempts)`);
                    
                    if (failedLoginAttempts >= 3) {
                        document.getElementById('agentEscalationCard').classList.remove('hidden');
                    }
                }
            } catch (err) {
                showErrorBanner("Connection timed out communicating with backend drivers.");
            }
        }

        function renderPassengerDashboardView(booking) {
            document.getElementById('viewManageLoginPanel').classList.add('hidden');
            document.getElementById('viewDashboardPanel').classList.remove('hidden');

            document.getElementById('displayFlightNum').innerText = booking.flightNumber;
            document.getElementById('displayRouteFrom').innerText = booking.departure;
            document.getElementById('displayRouteTo').innerText = booking.arrival;
            document.getElementById('selectMeal').value = booking.mealPreference;
            document.getElementById('inputSeat').value = booking.seatNumber;
            
            const badge = document.getElementById('displayStatusBadge');
            const box = document.getElementById('statusHeaderBox');
            const disruption = document.getElementById('disruptionAlertCard');
            
            badge.innerText = booking.flightStatus;

            if (booking.flightStatus === 'Delayed') {
                box.className = "p-3 rounded-xl text-white bg-amber-500 font-medium shadow-md";
                badge.className = "text-[9px] px-2 py-0.5 rounded-full uppercase font-bold bg-amber-700 text-white";
                disruption.classList.remove('hidden');
            } else {
                box.className = "p-3 rounded-xl text-blue-900 bg-blue-50 border border-blue-200 font-medium shadow-sm";
                badge.className = "text-[9px] px-2 py-0.5 rounded-full uppercase font-bold bg-blue-200 text-blue-800";
                disruption.classList.add('hidden');
            }
        }

        async function handleAncillaryUpdate() {
            const meal = document.getElementById('selectMeal').value;
            const seat = document.getElementById('inputSeat').value.trim();

            try {
                const res = await fetch(`${BASE_API_URL}/bookings/${savedActivePnr}/services`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mealPreference: meal, seatNumber: seat })
                });
                const payload = await res.json();
                if (res.ok) {
                    alert("✨ Transaction success! Options committed to MongoDB securely.");
                } else {
                    showErrorBanner(payload.message);
                }
            } catch (err) {
                showErrorBanner("Write modification action pipeline broken.");
            }
        }

        async function handleAutomatedRebook() {
            try {
                const res = await fetch(`${BASE_API_URL}/bookings/${savedActivePnr}/rebook`, { method: 'POST' });
                const payload = await res.json();
                if (res.ok) {
                    alert("✈️ Disruption Overridden. Journey successfully rerouted via backup schedule vectors.");
                    renderPassengerDashboardView(payload.booking);
                } else {
                    showErrorBanner(payload.message);
                }
            } catch (err) {
                showErrorBanner("Critical runtime fault executing automated rebooking script.");
            }
        }

        function exitDashboardSession() {
            document.getElementById('viewDashboardPanel').classList.add('hidden');
            document.getElementById('viewManageLoginPanel').classList.remove('hidden');
            document.getElementById('inputPnr').value = '';
            document.getElementById('inputLastName').value = '';
            savedActivePnr = '';
            failedLoginAttempts = 0;
            document.getElementById('agentEscalationCard').classList.add('hidden');
        }

        function showErrorBanner(msg) {
            const box = document.getElementById('errorBox');
            if (msg) {
                box.innerText = msg;
                box.classList.remove('hidden');
            } else {
                box.classList.add('hidden');
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>BlueWings Airlines | Conversational Booking</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/chat.css">

    <link rel="stylesheet" href="css/responsive.css">

    <link rel="stylesheet" href="css/animations.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <div class="app">

        <!-- Sidebar -->

        <aside class="sidebar">

            <div class="logo">

                ✈

                <h2>BlueWings</h2>

            </div>

            <button class="menu-btn active"
                id="bookBtn">

                ✈ Book Flight

            </button>

            <button class="menu-btn"
                id="manageBtn">

                🛄 Manage Booking

            </button>

            <button class="menu-btn"
                id="statusBtn">

                📍 Flight Status

            </button>

            <button class="menu-btn"
                id="agentBtn">

                💬 Talk to Agent

            </button>

        </aside>



        <!-- Chat Window -->

        <main class="chat-window">

            <!-- Header -->

            <header class="chat-header">

                <div class="avatar">

                    🤖

                </div>

                <div>

                    <h3>

                        BlueWings Assistant

                    </h3>

                    <span class="online">

                        ● Online

                    </span>

                </div>

            </header>



            <!-- Chat Area -->

            <section id="chatMessages"
                class="chat-messages">

            </section>



            <!-- Quick Replies -->

            <div
                id="quickReplies"
                class="quick-replies">

            </div>



            <!-- Input -->

            <div class="chat-input">

                <input
                    id="messageInput"
                    type="text"
                    placeholder="Type your message...">

                <button
                    id="sendBtn">

                    Send

                </button>

            </div>

        </main>

    </div>



    <!-- Scripts -->

    <script src="js/api.js"></script>

    <script src="js/ui.js"></script>

    <script src="js/chatbot.js"></script>

    <script src="js/booking.js"></script>

    <script src="js/manageBooking.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
